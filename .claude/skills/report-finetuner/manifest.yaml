name: report-finetuner
version: 2.1.0   # per-skill SemVer (see .claude/rules/git-workflow.md); 2.0.0 = anatomy-v2 baseline; 2.1.0 = v3.1.0 re-homing — the finetune library's canonical home is now this skill's code/finetune.py
description: >
  Declarative manifest for the static/dynamic split. SKILL.md uses this to
  decide which fragments to load for a given request. This skill is a thin
  slash-command shortcut that launches the report-finetuner AGENT with a
  registration + period — a single handoff path, so there are no axes and no
  gates (proportionality rule in .claude/rules/skill-design.md); the
  always-loaded core is the handoff contract, and the resource pointers stay
  in one on-demand reference. Since v3.1.0 the skill also CARRIES the finetune
  core library (code/finetune.py, moved out of the jolt_toolkit package) that
  the agent drives.

always_load:
  # Skill-local core: the single contract that applies to every invocation —
  # launch the report-finetuner agent (Agent() call with REG + period), the
  # why-an-agent rationale, and the never-overwrite *_finetuned discipline.
  - static/core/handoff-contract.md

references:
  on_demand:
    - condition: needing the resource pointers (agent definition, finetune core library, past case studies / evaluation logs) or the user-side trigger phrasings
      path: references/related-resources.md
