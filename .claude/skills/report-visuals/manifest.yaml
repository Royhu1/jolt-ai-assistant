name: report-visuals
version: 1.1.0   # per-skill SemVer (see .claude/rules/git-workflow.md "Per-skill versions")
                 # 1.1.0 (P2b): EV repaint adopts the package's figure_hook seam
                 # (skill-local painter passed to run_segment_detection) + NEW
                 # repaint-finetuned CLI mode (rendering half of the
                 # report-finetuner flow, fed by a segments-JSON contract).
description: >
  Declarative manifest for the static/dynamic split. Code-owner skill
  (self-contained rendering code in code/, driven by render_visuals.py):
  repaints validation figures (EV + diesel, one figure per day + .boxes.json
  overlay sidecars), (re)writes inspect_*.html viewers from on-disk raw
  artefacts, and paints the *_finetuned figure/HTML sets for the
  report-finetuner flow (repaint-finetuned mode). Created in v3.1.0 by moving
  the rendering modules out of src/jolt_toolkit — since P2 the package paints
  nothing: the EV path passes this skill's painter through
  run_segment_detection's keyword-only figure_hook seam. No axes — the three
  CLI modes are documented in the always-loaded core contract; per the
  proportionality rule there are no fragments or padding references.

always_load:
  # The rendering contract: CLI modes + exact commands, artefact naming,
  # append-only / *_finetuned discipline, and the figure_hook seam status.
  - static/core/rendering-contract.md

gates:
  target_resolved: |
    BLOCKING. `repaint` needs an explicit vehicle report directory (or a DB
    base dir plus --reg); `rerender-html` needs --version + --db-root;
    `repaint-finetuned` needs --xlsx pointing at a *_finetuned.xlsx (plus a
    --segs-json produced by the report-finetuner skill unless --html-only).
    If the user names only a REG, ASK which report-database version /
    directory to operate on (e.g. excel_report_database/2.2.8/<REG>) — never
    guess between versions, and never repaint canonical DB artefacts the user
    did not name.

references:
  on_demand:
    - condition: >
        directory map, pipeline (data in → processing → artefacts out),
        ownership boundaries, neighbouring skills, per-module provenance and
        the finetuned-rendering CLI contract details
      path: README.md

assets:
  code: |
    code/render_visuals.py is the single entry CLI (subcommands: repaint,
    rerender-html, repaint-finetuned). Library modules: validation_figure.py
    (EV painter — also passed to the package as the figure_hook),
    diesel_visuals.py (diesel painter + in-place repaint),
    validation_generator.py (overlay-regenerate orchestrator),
    finetuned_visuals.py (finetuned repaint: overlay painting loop +
    finetuned inspect-HTML writer, fed by the segments JSON), html_viewer.py
    + assets/inspect_viewer_template.html (inspect viewer),
    rerender_inspect.py / refresh_inspect_html.py (HTML-only refresh paths).
    All moved out of the former package modules (v3.1.0); segmentation itself
    stays in jolt_toolkit and is called read-only.
