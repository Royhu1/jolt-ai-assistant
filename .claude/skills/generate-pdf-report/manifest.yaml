name: generate-pdf-report
version: 2.2.0   # per-skill SemVer (see .claude/rules/git-workflow.md); 2.0.0 = anatomy-v2 baseline;
                 # 2.1.0 (2026-07-13) = diesel-comparator variant (fuel_type DIESEL, e.g. YT21EFD:
                 # L/100km analysis, raw VDHR/LFC counter totals, tank-to-wheel CO2e card);
                 # 2.2.0 (2026-07-13) = --snapshot arg (regenerate in place inside a frozen
                 # output_by_<date> snapshot) + diesel page-1 stacked layout (full-height map,
                 # no emission-factor row — user review);
                 # 2.2.1 (2026-07-16) = external-review wording corrections on the diesel
                 # briefing (idling = fuel counter only; 40 t = extrapolated reference GVM;
                 # GVM-association not "load adds"; temp window named by bare mass range;
                 # legs/day; ± defined in footnote; GHG emissions in CO2e w/ UK Gov 2026
                 # factor attribution) + tight diesel page-2 footer;
                 # 2.2.2 (2026-07-16) = "trunk-haul" label removed from partner-facing text
                 # (unsubstantiated operational designation) — the mass/temperature subset
                 # is described only by its speed criterion (avg speed >= 50 km/h);
                 # 2.2.3 (2026-07-17) = simplified GHG summary line ("calculated based on
                 # 2.58354 kg CO2e/L, the UK Government 2026 factor")
description: >
  Declarative manifest for the static/dynamic split (pattern adapted from
  nature-skills/nature-figure). SKILL.md uses this to decide which fragments
  to load for a given briefing request. The main axis is the mode (generate a
  new briefing for a REG + period vs revise the briefing product's layout /
  charts / commentary); the deep commentary / field-applicability /
  verification material stays in on-demand references under references/
  (markdown git-tracked; only the local PDF exemplars are gitignored, see
  README.md). The rendered output is contract-fixed: two A4-portrait pages
  matching references/style_baseline_*.pdf (layout rules in
  static/core/layout-contract.md — finalised, do not revert).

always_load:
  # Skill-local core: the two contracts that apply to every run of the skill.
  - static/core/layout-contract.md
  - static/core/discipline.md

axes:
  mode:
    detect: |
      Default to `generate` whenever a briefing for a REG + period is
      requested (triggers 1–3 in the SKILL.md description), including
      --all-data / per-operator / --anon / --page1-basis runs. Choose
      `revise` when the request is about the wording, charts, layout or
      commentary of the briefing product or an existing briefing — e.g.
      applying partner review comments, rewording conclusions, chart/layout
      spec changes (trigger 4). If ambiguous (e.g. "update the briefing"),
      ask whether the user wants a fresh generation run for a period or a
      change to how briefings look/read.
    values:
      generate: static/fragments/mode/generate.md
      revise: static/fragments/mode/revise.md
    multi: false

gates:
  source_xlsx: |
    BLOCKING. The xlsx for the target period must already exist under
    excel_report_database/<version>/<REG>/ — either an exact-period report,
    or a wider one whose [start,end] covers the target period (the generator
    auto-selects the closest covering report and clips the data to the target
    window). If neither exists, hand off to /generate-excel-report first.
  headless_chrome: |
    BLOCKING for PDF output. This machine must have Chrome / Edge (headless
    PDF rendering). (HERE_API_KEY in the repo-root .env is NOT blocking: if
    missing / on network failure the route map falls back to a basemap-free
    schematic and the caption switches to "indicative".)
  temperature_backfilled: |
    BLOCKING for a meaningful EP-vs-temperature figure. The report's
    temperature column must hold real values, not the LoggerPatcher
    placeholder 0 (the run will not crash, but EP-vs-temp is meaningless) —
    backfill first via the weather-patch flow in the generate fragment
    (§2 Preconditions). Check: driving-segment temperature nunique > 1.

references:
  # NOTE: in `generate` mode all three on-demand references are effectively mandatory
  # (commentary-style + verification on every run; field-applicability whenever any
  # field shows "—") — agents must not skip them.
  on_demand:
    - condition: writing or editing the page-2 Conclusions / page-1 Summary (load points + band judgement, load sensitivity, temperature line, regen line, distribution-variant wording, PAGE-2-ONLY cleaning rules) — mandatory whenever commentary is produced or changed
      path: references/commentary-style.md
    - condition: deciding whether a briefing field is real pipeline data, partially available, or N/A ("—" not 0; never fabricate)
      path: references/field-applicability.md
    - condition: after every generation run (MANDATORY) — AI-side PDF checks + the shipped verification_*.xlsx workbook for the human verifier
      path: references/verification.md

assets:
  references_local: |
    references/ also holds the two gitignored local PDF style references
    (root .gitignore ignores references/*.pdf; see README.md §Style
    references): the EVITA Round Robin 1 Case Study (source of the layout)
    and style_baseline_YK73WFN_20250306_20250522.pdf (the authoritative
    finalised-style snapshot new reports must match).
